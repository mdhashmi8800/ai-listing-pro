<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #razorpay-container {
            width: 100%;
            height: 100%;
        }
        /* Razorpay embedded form fills the iframe */
        .razorpay-container iframe,
        #razorpay-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }
    </style>
</head>
<body>
<div id="razorpay-container"></div>
<script>
    /* Allowed origins for postMessage */
    const ALLOWED_ORIGINS = [
        location.origin,
        'https://meesho-ai-tool.vercel.app',
        'https://supplier.meesho.com'
    ];

    function safePostToParent(data) {
        try { window.parent.postMessage(data, '*'); } catch(e) { console.error('postMessage error', e); }
    }

    /* Tell parent that iframe is ready */
    safePostToParent({ type: "RZP_IFRAME_READY" });

    let currentRzp = null;

    window.addEventListener("message", function (event) {
        /* Validate origin — accept extension origin or known hosts */
        const fromExtension = event.origin.startsWith('chrome-extension://');
        const fromAllowed = ALLOWED_ORIGINS.includes(event.origin);
        if (!fromExtension && !fromAllowed) {
            console.warn('Rejected postMessage from:', event.origin);
            return;
        }

        if (!event.data || event.data.type !== "START_PAYMENT") return;

        /* Destroy previous instance if any */
        if (currentRzp) {
            try { currentRzp.close(); } catch(_) {}
            currentRzp = null;
        }

        /* Clear container for fresh render */
        const container = document.getElementById('razorpay-container');
        container.innerHTML = '';

        const options = {
            key: event.data.key,
            amount: event.data.amount,
            currency: "INR",
            name: "AI Listing Pro",
            order_id: event.data.order_id,

            handler: function (response) {
                safePostToParent({
                    type: "PAYMENT_SUCCESS",
                    data: response
                });
            },

            modal: {
                ondismiss: function () {
                    safePostToParent({ type: "PAYMENT_CANCELLED" });
                },
                /* Prevent escape key from closing */
                escape: false,
                /* Prevent backdrop click from closing */
                backdropclose: false
            },

            /* Prefill phone if provided */
            prefill: event.data.phone ? { contact: '+91' + event.data.phone } : {}
        };

        currentRzp = new Razorpay(options);
        currentRzp.open();
    });
</script>
</body>
</html>
