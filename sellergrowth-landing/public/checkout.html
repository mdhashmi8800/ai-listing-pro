<!DOCTYPE html>
<html>

<head>
    <title>Secure Checkout - AI Listing Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8fafc;
            color: #0f172a;
        }

        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #64748b;
        }

        #loader {
            display: none;
        }

        button {
            margin-top: 16px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="loader" id="loader"></div>
    <h2 id="status">Secure Checkout</h2>
    <p id="sub-status">Click below to start payment.</p>
    <button id="pay-btn" onclick="startPayment()">Pay ₹499</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const selectedAmount = Number(params.get('amount')) || 499;
        const payBtn = document.getElementById('pay-btn');
        payBtn.textContent = `Pay ₹${selectedAmount}`;

        async function startPayment() {
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');

            loader.style.display = 'block';
            status.textContent = 'Creating Order...';
            subStatus.textContent = 'Please wait while we prepare secure checkout.';
            payBtn.disabled = true;

            let order;

            try {
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: selectedAmount })
                });

                order = await response.json();

                if (!response.ok || !order.id) {
                    throw new Error(order.error || 'Order creation failed');
                }
            } catch (error) {
                loader.style.display = 'none';
                status.textContent = 'Order Creation Failed';
                subStatus.textContent = error.message || 'Please try again.';
                payBtn.disabled = false;
                alert('Order creation failed');
                return;
            }

            const options = {
                key: 'rzp_live_xxxxxxxxx',
                amount: order.amount,
                currency: 'INR',
                name: 'AI Listing Pro',
                description: 'Pro Plan',
                order_id: order.id,
                handler: function () {
                    alert('Payment Successful!');
                    window.location.href = '/';
                },
                modal: {
                    ondismiss: function () {
                        loader.style.display = 'none';
                        status.textContent = 'Secure Checkout';
                        subStatus.textContent = 'Payment cancelled. You can try again.';
                        payBtn.disabled = false;
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.on('payment.failed', function (response) {
                loader.style.display = 'none';
                status.textContent = 'Payment Failed';
                subStatus.textContent = response.error.description || 'Please try again.';
                payBtn.disabled = false;
            });

            loader.style.display = 'none';
            status.textContent = 'Opening Razorpay...';
            subStatus.textContent = 'Complete your payment in the popup.';
            rzp.open();
        }
    </script>
</body>

</html>
